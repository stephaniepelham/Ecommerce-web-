<div class="cart-item">
  <img [src]="item.product.imageUrl" [alt]="item.product.name" loading="lazy" />
  <div class="item-details">
    <h3>{{ item.product.name }}</h3>
    <p class="category">{{ item.product.category }}</p>
    <p><strong>Price:</strong> ${{ item.product.price.toFixed(2) }}</p>
    <p><strong>Subtotal:</strong> ${{ (item.product.price * item.quantity).toFixed(2) }}</p>
    <div class="quantity-control">
      <button (click)="decrease()">-</button>
      <span>{{ item.quantity }}</span>
      <button (click)="increase()">+</button>
    </div>
    <button class="secondary" (click)="removeItem()">Remove</button>
  </div>
</div>
