<section class="cart-page">
  <h2>Your Shopping Cart</h2>
  <ng-container *ngIf="cartItems$ | async as items; else emptyCart">
    <div *ngIf="items.length; else emptyCart">
      <app-cart-item
        *ngFor="let item of items"
        [item]="item"
        (remove)="removeItem($event)"
        (quantityChange)="updateQuantity($event)">
      </app-cart-item>
      <div class="cart-summary">
        <p>Total: <strong>${{ total.toFixed(2) }}</strong></p>
        <a routerLink="/checkout" class="button primary">Proceed to Checkout</a>
      </div>
    </div>
  </ng-container>
  <ng-template #emptyCart>
    <p>Your cart is empty. Browse products from the <a routerLink="/">home page</a>.</p>
  </ng-template>
</section>
