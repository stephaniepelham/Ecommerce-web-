<div class="card h-100 shadow-sm">
  <img [src]="product.imageUrl" [alt]="product.name" class="card-img-top" loading="lazy" />
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ product.name }}</h5>
    <p class="card-text text-muted">{{ product.category }}</p>
    <p class="card-text fw-bold text-primary">${{ product.price.toFixed(2) }}</p>
    <p class="card-text">{{ product.description }}</p>
    <div class="mt-auto">
      <button class="btn btn-primary me-2" [routerLink]="['/product', product.id]">View Details</button>
      <button class="btn btn-outline-secondary" (click)="addToCart()">Add to Cart</button>
    </div>
  </div>
</div>
